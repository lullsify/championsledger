<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Champion's Ledger">
  <meta name="theme-color" content="#080B1E">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>Champion's Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #EDE9FE;
      --surface: #FFFFFF;
      --surface2:#F5F3FF;
      --red:     #EC4899;
      --red2:    #F472B6;
      --gold:    #8B5CF6;
      --gold2:   #7C3AED;
      --bulb:    #DDD6FE;
      --lovisa:  #EE3D8A;
      --hugo:    #7C3AED;
      --white:   #1E1B4B;
      --muted:   rgba(30,27,75,0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #EDE9FE;
      min-height: 100vh;
      color: var(--white);
      overflow-x: hidden;
    }


    #app { max-width: 480px; margin: 0 auto; padding-bottom: 60px; position: relative; z-index: 1; }



    .header-title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .header-deco { font-size: 30px; filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.25)); }

    .header-title {
      font-family: 'Lilita One', cursive;
      font-size: 36px;
      line-height: 1.1;
      color: #1E1B4B;
      paint-order: stroke fill;
      text-shadow: none;
    }

    .title-sub {
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #1E1B4B;
      margin-bottom: 2px;
    }

    header {
      padding: max(16px, env(safe-area-inset-top)) 16px 0;
      text-align: center;
      position: relative;
    }


    /* Bulb track strips */


    .header-title {
      font-family: 'Lilita One', cursive;
      font-size: 34px;
      line-height: 1.1;
      color: #1E1B4B;
      paint-order: stroke fill;
      text-shadow: none;
      margin-bottom: 2px;
    }

    .title-sub {
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1E1B4B;
    }

    /* Gold divider */

    /* Players */
    .header-players {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 10px 0 6px;
    }

    .header-player { display:flex; flex-direction:column; align-items:center; gap:4px; }

    .avatar-ring {
      width: 70px; height: 70px;
      border-radius: 50%;
      padding: 3px;
      position: relative;
    }
    .avatar-ring.lovisa {
      background: conic-gradient(var(--lovisa) 0%, #FFAAD0 50%, var(--lovisa) 100%);
      box-shadow: 0 0 16px rgba(240,90,154,0.4);
    }
    .avatar-ring.hugo {
      background: conic-gradient(var(--hugo) 0%, #D8A8FF 50%, var(--hugo) 100%);
      box-shadow: 0 0 16px rgba(168,85,247,0.4);
    }

    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--bg);
      display: flex; align-items:center; justify-content:center;
      overflow: hidden;
    }

    .header-avatar { width: 60px; height: 60px; }

    /* ── PHOTO AVATARS ── */
    .photo-wrap {
      position: relative;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }
    .photo-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .mood-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      font-size: 20px;
      line-height: 1;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.3));
      pointer-events: none;
      animation: moodPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes moodPop {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .photo-wrap { transition: box-shadow 0.4s ease; }
    .photo-wrap.mood-happy {
      box-shadow: 0 0 0 3px currentColor, 0 0 14px 4px rgba(255,180,100,0.4);
    }
    .photo-wrap.mood-sad {
      box-shadow: 0 0 0 2px rgba(150,150,150,0.4);
    }

    .header-name {
      font-family: 'Lilita One', cursive;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .header-name.lovisa { color: var(--lovisa); }
    .header-name.hugo   { color: var(--hugo); }

    .header-vs {
      font-family: 'Lilita One', cursive;
      font-size: 30px;
      color: var(--white);
      text-shadow: none;
      letter-spacing: 2px;
      padding-bottom: 22px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: #DDD6FE;
      border-bottom: 2px solid rgba(124,58,237,0.15);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      font-family: 'Lilita One', cursive;
      font-size: 13px;
      letter-spacing: 0.5px;
      color: rgba(30,27,75,0.45);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
      position: relative;
    }
    .tab-btn.active { color: #1E1B4B; }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 18%; right: 18%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--lovisa), var(--hugo), transparent);
    }

    /* ── TAB CONTENT ── */
    .tab-content { display:none; padding:10px; }
    .tab-content.active { display:block; }

    /* ── GAME CARDS ── */
    .games-list { display:flex; flex-direction:column; gap:10px; }

    .game-card {
      background: #FFFFFF;
      border-radius: 20px;
      overflow: hidden;
      border: none;
      box-shadow: 0 4px 24px rgba(124,58,237,0.1), 0 1px 4px rgba(124,58,237,0.06);
      animation: fadeUp 0.3s ease both;
      position: relative;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top:0; left:0; right:0;
      height: 3px;
      background: linear-gradient(90deg, var(--lovisa), var(--hugo));
      opacity: 1;
    }

    .game-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .game-icon { font-size: 22px; line-height:1; }

    .game-name {
      font-family: 'Lilita One', cursive;
      font-size: 15px;
      color: #1A1200;
      flex: 1;
      letter-spacing: 0.3px;
    }

    .game-badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(232,150,26,0.08);
      border: 1px solid rgba(232,150,26,0.2);
      border-radius: 20px;
      padding: 2px 9px;
    }


    .delete-game-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      cursor: pointer;
      display: flex; align-items:center; justify-content:center;
      transition: all 0.15s;
      flex-shrink: 0;
      margin-left: auto;
    }
    .delete-game-btn:active { background: rgba(196,30,30,0.25); color: #ff6b6b; border-color: #ff6b6b; }
    .game-players {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .player-col { display: contents; }
    .player-col-mid { display: contents; }

    .player-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .player-cell.left { border-right: 1px solid rgba(0,0,0,0.07); }
    .player-cell.avatar-cell { padding: 10px 8px 4px; }
    .player-cell.name-cell   { padding: 2px 8px; }
    .player-cell.score-cell  { padding: 2px 8px; }
    .player-cell.btn-cell    { padding: 4px 8px 10px; gap: 4px; }

    .mini-avatar { width: 52px; height: 52px; }

    .player-col-name {
      font-family: 'Lilita One', cursive;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .player-col-name.lovisa { color: var(--lovisa); }
    .player-col-name.hugo   { color: var(--hugo); }

    .score-num {
      font-family: 'Lilita One', cursive;
      font-size: 36px;
      line-height: 1;
      color: #1A1200;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
      min-width: 28px;
      text-align: center;
    }
    .score-num:active { background: rgba(0,0,0,0.05); }

    .score-input {
      font-family: 'Lilita One', cursive;
      font-size: 36px;
      line-height: 1;
      color: #1A1200;
      background: rgba(0,0,0,0.04);
      border: 1.5px solid rgba(0,0,0,0.15);
      border-radius: 6px;
      width: 70px;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
      padding: 2px 0;
    }

    .win-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 2px solid;
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      display: flex; align-items:center; justify-content:center;
      transition: transform 0.12s, box-shadow 0.15s;
      user-select: none;
      line-height: 1;
      flex-shrink: 0;
    }
    .win-btn:active { transform: scale(0.87); }

    .win-btn.lovisa {
      background: rgba(240,90,154,0.12);
      border-color: var(--lovisa);
      color: var(--lovisa);
      box-shadow: 0 0 14px rgba(240,90,154,0.2);
    }
    .win-btn.lovisa:active { box-shadow: 0 0 22px rgba(240,90,154,0.55); }

    .win-btn.hugo {
      background: rgba(168,85,247,0.12);
      border-color: var(--hugo);
      color: var(--hugo);
      box-shadow: 0 0 14px rgba(168,85,247,0.2);
    }
    .win-btn.hugo:active { box-shadow: 0 0 22px rgba(168,85,247,0.55); }

    .minus-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(30,27,75,0.15);
      background: transparent;
      color: rgba(30,27,75,0.3);
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items:center; justify-content:center;
      transition: all 0.15s;
      line-height: 1;
      user-select: none;
    }
    .minus-btn:active { transform: scale(0.87); background: rgba(255,255,255,0.06); }
    .minus-btn:disabled { opacity: 0.2; pointer-events: none; }

    /* ── UNDO TOAST ── */
    .undo-toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #FFF8DC;
      border: 1px solid rgba(0,0,0,0.1);
      color: #1A1200;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items:center; gap:10px;
      z-index: 300;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    .undo-toast.visible { transform: translateX(-50%) translateY(0); }

    .undo-action {
      background: rgba(124,58,237,0.1);
      border: 1px solid var(--hugo);
      color: var(--hugo);
      border-radius: 20px;
      padding: 4px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── HALL OF FAME ── */
    .fame-marquee {
      border: 2px solid #DDD6FE;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 14px;
      background: #FFFFFF;
      box-shadow: 0 4px 24px rgba(124,58,237,0.1);
      position: relative;
    }
    .fame-marquee::before {
      content: '';
      position: absolute;
      top:0; left:0; right:0;
      height: 3px;
      background: linear-gradient(90deg, var(--lovisa), var(--hugo));
    }


    .fame-inner { padding: 4px 16px 18px; }

    .fame-eyebrow {
      font-family: 'Pacifico', cursive;
      font-size: 13px;
      color: var(--gold2);
      text-align: center;
      margin-bottom: 4px;
      opacity: 0.85;
    }

    .fame-title {
      font-family: 'Lilita One', cursive;
      font-size: 26px;
      text-align: center;
      color: var(--white);
      text-shadow: none;
      margin-bottom: 16px;
    }

    .fame-scoreline { display:flex; justify-content:space-around; align-items:center; }

    .fame-player { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .fame-avatar { width: 64px; height: 64px; }

    .fame-big-num {
      font-family: 'Lilita One', cursive;
      font-size: 52px;
      line-height: 1;
    }

    .fame-num-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    .fame-center { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .fame-vs {
      font-family: 'Lilita One', cursive;
      font-size: 22px;
      color: rgba(255,255,255,0.18);
    }
    .fame-crown {
      font-family: 'Pacifico', cursive;
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }

    .fame-section-label {
      font-family: 'Lilita One', cursive;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      padding: 6px 0 10px;
    }

    .fame-games-list { display:flex; flex-direction:column; gap:8px; }

    .fame-game-row {
      background: var(--surface);
      background-image: linear-gradient(135deg, rgba(255,255,255,0.025) 0%, transparent 60%);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex; align-items:center; gap:12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    .fame-game-icon { font-size: 22px; }
    .fame-game-info { flex: 1; }
    .fame-game-title {
      font-family: 'Lilita One', cursive;
      font-size: 15px;
      letter-spacing: 0.3px;
      color: var(--white);
    }

    .fame-winner-wrap {
      position: relative;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .fame-winner-wrap svg { display: block; }

    .fame-winner-crown {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(255,200,50,0.8));
      pointer-events: none;
    }


    .fame-tie-wrap {
      display: flex;
      align-items: center;
      gap: -8px;
    }
    .fame-tie-wrap .fame-winner-wrap:last-child {
      margin-left: -10px;
    }
    .fame-no-winner {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.1);
      display: flex; align-items:center; justify-content:center;
      font-size: 18px;
      opacity: 0.25;
    }

    /* ── ADD GAME BUTTON ── */
    .add-game-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 6px;
      padding: 14px;
      background: transparent;
      border: 1.5px dashed rgba(124,58,237,0.3);
      border-radius: 16px;
      color: rgba(124,58,237,0.6);
      font-family: 'Lilita One', cursive;
      font-size: 13px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-game-btn:active {
      border-color: var(--hugo);
      color: var(--hugo);
      background: rgba(124,58,237,0.05);
    }

    /* ── ADD GAME MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-box {
      background: var(--surface);
      border: 2px solid #DDD6FE;
      border-radius: 20px;
      padding: 24px 20px 20px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 40px rgba(124,58,237,0.15), 0 20px 60px rgba(0,0,0,0.15);
      transform: translateY(12px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.open .modal-box {
      transform: translateY(0) scale(1);
    }
    .modal-title {
      font-family: 'Lilita One', cursive;
      font-size: 18px;
      color: var(--white);
      text-align: center;
      margin-bottom: 18px;
      text-shadow: none;
    }
    .emoji-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 14px;
    }
    .emoji-opt {
      width: 42px; height: 42px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: var(--surface2);
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items:center; justify-content:center;
      transition: all 0.15s;
    }
    .emoji-opt.selected {
      border-color: var(--hugo);
      background: rgba(124,58,237,0.1);
      box-shadow: 0 0 10px rgba(124,58,237,0.25);
    }
    .modal-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .modal-input:focus { border-color: var(--hugo); }
    .modal-input::placeholder { color: rgba(30,27,75,0.25); }
    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .modal-cancel {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .modal-save {
      flex: 2;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--lovisa), var(--hugo));
      color: #FFFFFF;
      font-family: 'Lilita One', cursive;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
      transition: box-shadow 0.15s;
    }
    .modal-save:active { box-shadow: 0 2px 8px rgba(124,58,237,0.15); }


    /* ── STREAK ── */
    .streak-badge {
      font-size: 12px;
      font-weight: 900;
      color: #FFB020;
      letter-spacing: 0.3px;
      display: flex; align-items:center; gap:2px;
      animation: streakPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes streakPop {
      0%   { transform: scale(0.5); opacity:0; }
      100% { transform: scale(1);   opacity:1; }
    }
    .streak-fire { display:inline-block; animation: fireWiggle 0.6s ease-in-out infinite alternate; }
    @keyframes fireWiggle { from { transform: rotate(-8deg) scale(1); } to { transform: rotate(8deg) scale(1.15); } }



    /* ── MILESTONE ── */
    .milestone-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 600;
      display: flex; align-items:center; justify-content:center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .milestone-overlay.open { opacity: 1; pointer-events: all; }

    .milestone-box {
      text-align: center;
      padding: 10px 20px 30px;
      transform: scale(0.7);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .milestone-overlay.open .milestone-box { transform: scale(1); }

    .milestone-emoji {
      font-size: 90px;
      line-height: 1;
      margin-bottom: 10px;
      animation: milestoneFloat 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(255,200,50,0.8));
    }
    @keyframes milestoneFloat {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-14px) rotate(4deg); }
    }
    .milestone-title {
      font-family: 'Lilita One', cursive;
      font-size: 46px;
      line-height: 1;
      color: #1E1B4B;
      text-shadow: none;
      margin-bottom: 10px;
      animation: milestoneGlow 1.2s ease-in-out infinite alternate;
    }
    @keyframes milestoneGlow {
      from { text-shadow: 0 0 20px rgba(124,58,237,0.4); }
      to   { text-shadow: 0 0 50px rgba(236,72,153,0.6); }
    }
    .milestone-sub {
      font-family: 'Pacifico', cursive;
      font-size: 17px;
      color: var(--gold2);
      opacity: 0.9;
      margin-bottom: 28px;
    }
    .milestone-tap {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ── EMPTY STATE ── */
    .empty-state { text-align:center; padding:40px 20px; }
    .empty-icon { font-size: 38px; opacity:0.25; margin-bottom:12px; }
    .empty-state p {
      font-family: 'Pacifico', cursive;
      font-size: 13px;
      color: var(--muted);
      line-height: 2;
    }

    /* ── CONFETTI ── */
    #confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:999; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes popIn {
      0%   { transform:scale(1); }
      40%  { transform:scale(1.38); }
      100% { transform:scale(1); }
    }
    .pop { animation: popIn 0.25s ease; }

      50%     { opacity: 0.55; }
    }

    .tab-content { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  </style>
</head>

<canvas id="confetti-canvas"></canvas>

<div id="app">
  <header>
    <div class="header-title-wrap">
      <span class="header-deco">🎲</span>
      <div class="header-title">Champion's Ledger</div>
      <span class="header-deco">🎲</span>
    </div>
    <div class="title-sub">Vinster räknas · ursäkter inte</div>

    <div class="header-players">

        <div class="avatar-ring lovisa">
          <div class="avatar-inner">
            <div class="header-avatar" id="hdr-lovisa"></div>
          </div>
        </div>
        <div class="header-name lovisa">Lovis</div>
      </div>
      <div class="header-vs">VS</div>
      <div class="header-player">
        <div class="avatar-ring hugo">
          <div class="avatar-inner">
            <div class="header-avatar" id="hdr-hugo"></div>
          </div>
        </div>
        <div class="header-name hugo">Huggi</div>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="games">🎲 Spelplanen</button>
    <button class="tab-btn" data-tab="fame">🏆 Ärans Hall</button>

  <div id="tab-games" class="tab-content active">

  </div>

  <div id="tab-fame" class="tab-content">
    <div id="fame-content"></div>
  </div>
</div>

<div class="undo-toast" id="undo-toast">
  <span id="undo-msg">Vinst registrerad!</span>
  <button class="undo-action" onclick="undoLast()">Ångra</button>
</div>

<div class="milestone-overlay" id="milestone-overlay" onclick="closeMilestone()">
  <div class="milestone-box">
    <div class="milestone-emoji" id="milestone-emoji">🏆</div>
    <div class="milestone-title" id="milestone-title">MÄSTARE!</div>
    <div class="milestone-sub" id="milestone-sub">Lovis · 10 vinster i Skip-Bo</div>
    <div class="milestone-tap">tryck för att stänga</div>
  </div>
</div>

<div class="modal-overlay" id="add-game-modal" onclick="handleModalClick(event)">
  <div class="modal-box">
    <div class="modal-title">Nytt spel</div>
    <div class="modal-label">Välj emoji</div>
    <div class="emoji-grid" id="emoji-grid">
      <button class="emoji-opt selected" data-emoji="🎲" onclick="pickEmoji(this)">🎲</button>
      <button class="emoji-opt" data-emoji="🃏" onclick="pickEmoji(this)">🃏</button>
      <button class="emoji-opt" data-emoji="♟️" onclick="pickEmoji(this)">♟️</button>
      <button class="emoji-opt" data-emoji="🎯" onclick="pickEmoji(this)">🎯</button>
      <button class="emoji-opt" data-emoji="🎳" onclick="pickEmoji(this)">🎳</button>
      <button class="emoji-opt" data-emoji="🎮" onclick="pickEmoji(this)">🎮</button>
      <button class="emoji-opt" data-emoji="🀄" onclick="pickEmoji(this)">🀄</button>
      <button class="emoji-opt" data-emoji="🎱" onclick="pickEmoji(this)">🎱</button>
      <button class="emoji-opt" data-emoji="🃟" onclick="pickEmoji(this)">🎴</button>
      <button class="emoji-opt" data-emoji="🏆" onclick="pickEmoji(this)">🏆</button>
    </div>
    <div class="modal-label">Spelets namn</div>
    <input class="modal-input" id="modal-name" type="text" placeholder="ex. Uno, Schack..." maxlength="30" autocomplete="off">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeAddGame()">Avbryt</button>
      <button class="modal-save" onclick="saveNewGame()">Lägg till</button>
    </div>
  </div>
</div>

const MILESTONES = [5, 10, 25, 50, 100];
const MILESTONE_LABELS = {
  5:  ['Lovande start!', '⭐'],
  10: ['Legendarisk!',   '🏆'],
  25: ['Odödlig!',       '👑'],
  50: ['Gudomlig!',      '💎'],
  100:['OSTOPPBAR!',     '🔥'],
};

function checkMilestone(gameId, player, newScore) {
  if (!MILESTONES.includes(newScore)) return;
  const gameName = allGames().find(g => g.id === gameId)?.name || '';
  const name = player === 'lovisa' ? 'Lovis' : 'Huggi';
  const [title, emoji] = MILESTONE_LABELS[newScore];
  setTimeout(() => {
    document.getElementById('milestone-emoji').textContent  = emoji;
    document.getElementById('milestone-title').textContent  = title;
    document.getElementById('milestone-sub').textContent    = `${name} · ${newScore} vinster i ${gameName}`;
    document.getElementById('milestone-overlay').classList.add('open');
    burst(player === 'lovisa' ? '#F05A9A' : '#A855F7');
    burst(player === 'lovisa' ? '#F05A9A' : '#A855F7');
  }, 400);
}
function closeMilestone() {
  document.getElementById('milestone-overlay').classList.remove('open');
}

const BUILTIN_GAMES = [
  { id:'skipbo',   name:'Skip-Bo',       emoji:'🃏' },
  { id:'yaniv',    name:'Yaniv',          emoji:'🎴' },
  { id:'alfapet',  name:'Alfapet',        emoji:'🔡' },
  { id:'monopoly', name:'Monopoly Deal',  emoji:'💰' },
  { id:'rummikub', name:'Rummikub',       emoji:'🎲' },
];

function allGames() {
  return [...BUILTIN_GAMES, ...(data.customGames || [])];
}

function initData() {
  const d = { scores:{}, customGames:[] };
  BUILTIN_GAMES.forEach(g => { d.scores[g.id] = { lovisa:0, hugo:0, lastPlayed:0, lastWinner:null, streak:{lovisa:0,hugo:0} }; });
  return d;
}
function loadData() {
  try { return JSON.parse(localStorage.getItem('cl-spel')||'null') || initData(); }
  catch { return initData(); }
}
function saveData() { localStorage.setItem('cl-spel', JSON.stringify(data)); }

let data = loadData(), lastAction = null, undoTimer = null;

function mood(mine, theirs) {
  return mine > theirs ? 'happy' : mine < theirs ? 'sad' : 'neutral';
}

function photoAvatar(player, moodState, sz) {
  const src   = player === 'lovisa' ? LOVISA_IMG : HUGGI_IMG;
  const posY  = player === 'lovisa' ? '18%' : '22%';

  const MOODS = {
    lovisa: {
      happy:   { filter: 'brightness(1.12) saturate(1.3)',               badge: '😏' },
      neutral: { filter: 'brightness(1.05) saturate(1.0)',               badge: '' },
      sad:     { filter: 'brightness(0.82) saturate(0.5) grayscale(0.2)', badge: '😒' }
    },
    hugo: {
      happy:   { filter: 'brightness(1.3) saturate(1.25)',               badge: '😎' },
      neutral: { filter: 'brightness(1.25) saturate(1.0)',               badge: '' },
      sad:     { filter: 'brightness(0.9) saturate(0.5) grayscale(0.2)', badge: '🫠' }
    }
  };

  const m          = MOODS[player][moodState] || MOODS[player].neutral;
  const moodClass  = moodState !== 'neutral' ? `mood-${moodState}` : '';
  const color      = player === 'lovisa' ? '#EE3D8A' : '#7C3AED';

  return `<div class="photo-wrap ${moodClass}" style="width:${sz}px;height:${sz}px;color:${color}">
    <img class="photo-img" src="${src}" style="object-position:center ${posY};filter:${m.filter};transition:filter 0.5s ease">
    ${m.badge ? `<span class="mood-badge">${m.badge}</span>` : ''}
  </div>`;
}

function sortedGames() {
  return allGames().sort((a,b) => (data.scores[b.id]?.lastPlayed||0) - (data.scores[a.id]?.lastPlayed||0));
}
function totalWins() {
  return allGames().reduce((acc,g) => {
    acc.lovisa += data.scores[g.id]?.lovisa||0;
    acc.hugo   += data.scores[g.id]?.hugo||0;
    return acc;
  }, { lovisa:0, hugo:0 });
}
function relativeTime(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now()-ts)/86400000);
  if (d===0) return 'Idag';
  if (d===1) return 'Igår';
  if (d<7)   return `${d} dagar sedan`;
  return new Date(ts).toLocaleDateString('sv-SE',{month:'short',day:'numeric'});
}

function renderHeader() {
  const t = totalWins();
  document.getElementById('hdr-lovisa').innerHTML = photoAvatar('lovisa', mood(t.lovisa,t.hugo), 72);
  document.getElementById('hdr-hugo').innerHTML   = photoAvatar('hugo',   mood(t.hugo,t.lovisa), 72);
}

function renderFame() {
  const t = totalWins();
  let crown = '';
  if (t.lovisa > t.hugo)        crown = `<div class="fame-crown" style="color:#F05A9A">★ Lovis<br>leder ★</div>`;
  else if (t.hugo > t.lovisa)   crown = `<div class="fame-crown" style="color:#A855F7">★ Huggi<br>leder ★</div>`;
  else if (t.lovisa+t.hugo > 0) crown = `<div class="fame-crown" style="color:rgba(255,255,255,0.3)">Dött lopp</div>`;

  const rows = allGames().map(g => {
    const s = data.scores[g.id];
    const played = s.lovisa > 0 || s.hugo > 0;
    const isTie = played && s.lovisa === s.hugo;
    const hasWinner = played && !isTie;
    const winnerAvatar = isTie
      ? `<div class="fame-tie-wrap">
           <div class="fame-winner-wrap">${photoAvatar('lovisa','happy',44)}<div class="fame-winner-crown">👑</div></div>
           <div class="fame-winner-wrap">${photoAvatar('hugo','happy',44)}<div class="fame-winner-crown">👑</div></div>
         </div>`
      : hasWinner
        ? `<div class="fame-winner-wrap">
             ${photoAvatar(s.lovisa > s.hugo ? 'lovisa' : 'hugo', 'happy', 48)}
             <div class="fame-winner-crown">👑</div>
           </div>`
        : `<div class="fame-no-winner">?</div>`;
    return `<div class="fame-game-row">
      <span class="fame-game-icon">${g.emoji}</span>
      <div class="fame-game-info">
        <div class="fame-game-title">${g.name}</div>
      </div>
      ${winnerAvatar}
    </div>`;
  });

  document.getElementById('fame-content').innerHTML = `
    <div class="fame-section-label">👑 Vem bär kronan? 👑</div>
    <div class="fame-games-list">${rows.join('')}</div>`;
}

function editScore(gameId, player, el) {
  const current = data.scores[gameId][player];
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.min = '0';
  inp.max = '9999';
  inp.value = current;
  inp.className = 'score-input';
  el.replaceWith(inp);
  inp.focus();
  inp.select();

  function commit() {
    const val = Math.max(0, parseInt(inp.value) || 0);
    data.scores[gameId][player] = val;
    saveData();
    render();
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { inp.blur(); }
    if (e.key === 'Escape') { render(); }
  });
}


function render() {
  renderHeader();
  renderGames();
  if (document.getElementById('tab-fame').classList.contains('active')) renderFame();
}

function addWin(gameId, player, btn) {
  const s = data.scores[gameId];
  s[player]++;
  s.lastPlayed = Date.now();
  s.lastWinner = player;
  if (!s.streak) s.streak = {lovisa:0, hugo:0};
  s.streak[player]++;
  const opp = player === 'lovisa' ? 'hugo' : 'lovisa';
  s.streak[opp] = 0;
  lastAction = { gameId, player, prevStreak: s.streak[player]-1 };
  checkMilestone(gameId, player, s[player]);
  saveData(); render();
  btn?.classList.remove('pop'); void btn?.offsetWidth; btn?.classList.add('pop');
  showUndo(player==='lovisa' ? 'Lovis' : 'Huggi');
  burst(player==='lovisa' ? '#F05A9A' : '#A855F7');
}

function removeWin(gameId, player) {
  if (data.scores[gameId][player] <= 0) return;
  data.scores[gameId][player]--;
  saveData();
  render();
}

/* ── ADD GAME MODAL ── */
let selectedEmoji = '🎲';

function openAddGame() {
  selectedEmoji = '🎲';
  document.querySelectorAll('.emoji-opt').forEach(b => b.classList.toggle('selected', b.dataset.emoji === selectedEmoji));
  document.getElementById('modal-name').value = '';
  document.getElementById('add-game-modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 250);
}

function closeAddGame() {
  document.getElementById('add-game-modal').classList.remove('open');
}

function handleModalClick(e) {
  if (e.target === e.currentTarget) closeAddGame();
}

function pickEmoji(btn) {
  selectedEmoji = btn.dataset.emoji;
  document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function deleteGame(id) {
  if (!confirm('Ta bort spelet?')) return;
  data.customGames = (data.customGames || []).filter(g => g.id !== id);
  delete data.scores[id];
  saveData();
  render();
}

function saveNewGame() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { document.getElementById('modal-name').focus(); return; }
  const id = 'custom_' + Date.now();
  const game = { id, name, emoji: selectedEmoji };
  if (!data.customGames) data.customGames = [];
  data.customGames.push(game);
  data.scores[id] = { lovisa:0, hugo:0, lastPlayed:0, lastWinner:null };
  saveData();
  closeAddGame();
  render();
}

function undoLast() {
  if (!lastAction) return;
  data.scores[lastAction.gameId][lastAction.player] = Math.max(0, data.scores[lastAction.gameId][lastAction.player]-1);
  saveData(); lastAction=null; hideUndo(); render();
}

function showUndo(name) {
  document.getElementById('undo-msg').textContent = `${name} +1 seger ✦`;
  document.getElementById('undo-toast').classList.add('visible');
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { hideUndo(); lastAction=null; }, 4000);
}
function hideUndo() {
  document.getElementById('undo-toast').classList.remove('visible');
  if (undoTimer) { clearTimeout(undoTimer); undoTimer=null; }
}

function burst(color) {

  const ctx = cvs.getContext('2d');
  const palette = [color, '#E8961A', '#F5C030', '#C41E1E', '#fff', color+'99'];
  const shapes = ['★','◆','●','✦'];
  const p = Array.from({length:70}, () => ({
    x:Math.random()*cvs.width, y:-8-Math.random()*50,
    vx:(Math.random()-.5)*7, vy:Math.random()*3.5+1.5,
    size:Math.random()*13+6,
    color:palette[Math.floor(Math.random()*palette.length)],
    shape:shapes[Math.floor(Math.random()*shapes.length)],
    rot:Math.random()*360, rotV:(Math.random()-.5)*8,
  }));
  let f=0;
  (function draw() {
    ctx.clearRect(0,0,cvs.width,cvs.height);
    p.forEach(q => {
      q.x+=q.vx; q.y+=q.vy; q.vy+=0.13; q.rot+=q.rotV;
      ctx.save();
      ctx.globalAlpha = Math.max(0, 1-f/80);
      ctx.font = `${q.size}px serif`;
      ctx.fillStyle = q.color;
      ctx.translate(q.x,q.y);
      ctx.rotate(q.rot*Math.PI/180);
      ctx.fillText(q.shape, -q.size/2, q.size/2);
      ctx.restore();
    });
    if (++f<88) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cvs.width,cvs.height);
  })();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab==='fame') renderFame();
  });
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

render();
</script>
</body>
</html>
